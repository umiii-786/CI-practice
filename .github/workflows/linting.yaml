
name: CI
on: push

jobs:
 linting:
  name: checking errors
  runs-on: ${{ matrix.os }}
  strategy:
    matrix:
      os: [ubuntu-latest, window-latest, macos-latest]
  steps:
   - name: checkout code
     uses: actions/checkout@v6

   - name: python install
     uses: actions/setup-python@v6

   - name: install packages
     run: |
       python -m pip install --upgrade pip
       pip install flake8
    
   - name: run flake8
     run: | 
        flake8 app.py 